<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Website</title>

<style>
:root{
    --bg:#0f0f0f;
    --card:#1e1e1e;
    --text:white;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
    transition:0.3s;
}

.light-mode{
    --bg:#f4f4f4;
    --card:#ffffff;
    --text:#111;
}

nav{
    display:flex;
    justify-content:center;
    gap:15px;
    padding:15px;
    background:#1a1a1a;
    flex-wrap:wrap;
}

nav button{
    background:#333;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:20px;
    cursor:pointer;
    transition:0.3s;
}

nav button:hover{
    transform:scale(1.1);
    background:#555;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
}

.status{
    padding:8px 15px;
    border-radius:20px;
    font-weight:bold;
}

.card{
    background:var(--card);
    width:320px;
    margin:30px auto;
    padding:25px;
    border-radius:25px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.progress-bar{
    background:#333;
    border-radius:20px;
    overflow:hidden;
    margin-top:15px;
}

.progress{
    height:20px;
    background:limegreen;
    width:50%;
    text-align:center;
    font-size:12px;
}

.tab{ display:none; padding:20px; text-align:center; }
.active-tab{ display:block; }

.button{
    padding:10px 15px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    margin:5px;
    transition:0.3s;
}

.button:hover{
    transform:scale(1.1);
}

.admin-panel{
    display:none;
    background:var(--card);
    padding:20px;
    margin:40px auto;
    width:350px;
    border-radius:20px;
}

input, textarea{
    width:90%;
    margin:5px;
    padding:6px;
}

.social-btn{
    display:inline-block;
    padding:10px 15px;
    margin:5px;
    border-radius:15px;
    text-decoration:none;
    color:white;
    transition:0.3s;
}

.social-btn:hover{
    transform:scale(1.1);
}

.discord{ background:#5865F2; }
.tiktok{ background:#000; }
.youtube{ background:red; }

.clock{
    font-weight:bold;
}

.visitor{
    font-size:14px;
}
</style>
</head>

<body>

<header>
    <h2>My Website</h2>
    <div>
        <span class="clock" id="clock"></span>
        <span class="visitor" id="visitorCount"></span>
        <button class="button" onclick="toggleMode()">🌙</button>
    </div>
</header>

<nav>
    <button onclick="showTab('home')">Home</button>
    <button onclick="showTab('social')">Social / Business</button>
</nav>

<div id="home" class="tab active-tab">
    <div class="card">
        <h3>Server Status</h3>
        <div id="serverStatus" class="status" style="background:green;">Online</div>
    </div>
</div>

<div id="social" class="tab">
    <h3>Social / Business</h3>
    <a href="#" class="social-btn discord">Discord</a>
    <a href="#" class="social-btn tiktok">TikTok</a>
    <a href="#" class="social-btn youtube">YouTube</a>
</div>

<div style="text-align:center;">
<button class="button" onclick="login()">Admin Login</button>
<button class="button" onclick="logout()">Logout</button>
</div>

<div class="admin-panel" id="adminPanel">
<h3>Admin Panel</h3>

<input type="text" id="newServerStatus" placeholder="Server Status Text"><br>
<input type="color" id="serverColor"><br>

<button onclick="updateServer()">Update Server</button>
</div>

<script>

let password = "max";
let isAdmin = false;

/* Tabs */
function showTab(tab){
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active-tab"));
    document.getElementById(tab).classList.add("active-tab");
}

/* Login */
function login(){
    let userPass = prompt("Enter password:");
    if(userPass === password){
        isAdmin = true;
        document.getElementById("adminPanel").style.display = "block";
        alert("Admin mode activated");
    } else alert("Wrong password!");
}

function logout(){
    isAdmin = false;
    document.getElementById("adminPanel").style.display = "none";
    alert("Logged out");
}

/* Server Status */
function updateServer(){
    if(!isAdmin) return alert("Admin only");

    let text = document.getElementById("newServerStatus").value;
    let color = document.getElementById("serverColor").value;

    if(text){
        let status = document.getElementById("serverStatus");
        status.innerText = text;
        status.style.background = color || "green";
    }
}

/* Dark / Light Mode */
function toggleMode(){
    document.body.classList.toggle("light-mode");
}

/* Live Clock */
function updateClock(){
    let now = new Date();
    document.getElementById("clock").innerText =
        now.toLocaleTimeString() + " | ";
}
setInterval(updateClock,1000);

/* Visitor Counter */
if(localStorage.getItem("visits")){
    let visits = Number(localStorage.getItem("visits")) + 1;
    localStorage.setItem("visits", visits);
}else{
    localStorage.setItem("visits",1);
}
document.getElementById("visitorCount").innerText =
    "Visitors: " + localStorage.getItem("visits");

</script>

</body>
</html>
